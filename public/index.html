function saveHand() {
  document.getElementById('dropdownMenu').classList.remove('open');
  if (!currentHandId) {
    saveHandAs();
    return;
  }
  const hands = getSavedHands();
  const idx = hands.findIndex(h => h.id === currentHandId);
  if (idx >= 0) {
    hands[idx].state = getHandState();
    hands[idx].updatedAt = new Date().toISOString();
    saveSavedHands(hands);
    showToast('Hand saved');
  } else {
    saveHandAs();
  }
}

          <div class="li-name">${h.name}</div>
          <div class="li-date">${date}</div>
          <div class="li-info">${blinds} | ${size}${result ? ' | ' + result : ''}</div>
          <div class="load-item-actions">
            <button onclick="event.stopPropagation();deleteHand('${h.id}');" class="delete-btn">Delete</button>
          </div>
        </div>`;
    }).join('');
  }
  document.getElementById('loadOverlay').classList.add('active');
}

function closeLoadModal() {
  document.getElementById('loadOverlay').classList.remove('active');
}

function loadHand(id) {
  const hands = getSavedHands();
  const hand = hands.find(h => h.id === id);
  if (!hand) return;
  currentHandId = hand.id;
  currentHandName = hand.name;
  loadHandState(hand.state);
  closeLoadModal();
  showToast('Loaded "' + hand.name + '"');
}

function deleteHand(id) {
  let hands = getSavedHands();
  hands = hands.filter(h => h.id !== id);
  saveSavedHands(hands);
  if (currentHandId === id) {
    currentHandId = null;
    currentHandName = null;
  }
  openLoadModal(); // refresh list
  showToast('Hand deleted');
}

// ==================== VOICE RECORDING ====================
let mediaRecorder = null;
let audioChunks = [];
let voiceTimerInterval = null;
let voiceStartTime = null;
let isRecording = false;

function toggleVoiceRecording() {
  if (isRecording) {
    stopAndTranscribe();
  } else {
    startVoiceRecording();
  }
}

async function startVoiceRecording() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    mediaRecorder = new MediaRecorder(stream, { mimeType: 'audio/webm;codecs=opus' });
    audioChunks = [];

    mediaRecorder.ondataavailable = (e) => {
      if (e.data.size > 0) audioChunks.push(e.data);
    };

    mediaRecorder.start(1000);
    isRecording = true;
    voiceStartTime = Date.now();

    document.getElementById('micBtn').classList.add('recording');
    document.getElementById('voiceOverlay').classList.add('active');
    document.getElementById('voiceStatus').textContent = 'Recording...';
    document.getElementById('voiceTranscript').textContent = '';
    document.getElementById('voiceTranscript').classList.remove('has-text');
    document.getElementById('voiceStopBtn').disabled = false;
    document.getElementById('voiceStopBtn').textContent = 'Stop & Process';
    document.getElementById('voiceStopBtn').classList.remove('processing');

    voiceTimerInterval = setInterval(() => {
      const elapsed = Math.floor((Date.now() - voiceStartTime) / 1000);
      const mins = Math.floor(elapsed / 60);
      const secs = elapsed % 60;
      document.getElementById('voiceTimer').textContent = mins + ':' + String(secs).padStart(2, '0');
    }, 200);
  } catch (err) {
    alert('Microphone access denied. Please allow microphone access.');
  }
}

function cancelVoiceRecording() {
  if (mediaRecorder && mediaRecorder.state !== 'inactive') {
    mediaRecorder.stop();
    mediaRecorder.stream.getTracks().forEach(t => t.stop());
  }
  isRecording = false;
  clearInterval(voiceTimerInterval);
  document.getElementById('micBtn').classList.remove('recording');
  document.getElementById('voiceOverlay').classList.remove('active');
  document.getElementById('voiceTimer').textContent = '0:00';
}

async function stopAndTranscribe() {
  if (!mediaRecorder || mediaRecorder.state === 'inactive') return;

  document.getElementById('voiceStopBtn').disabled = true;
  document.getElementById('voiceStopBtn').textContent = 'Processing...';
  document.getElementById('voiceStopBtn').classList.add('processing');
  document.getElementById('voiceStatus').textContent = 'Transcribing...';

  return new Promise((resolve) => {
    mediaRecorder.onstop = async () => {
      mediaRecorder.stream.getTracks().forEach(t => t.stop());
      isRecording = false;
      clearInterval(voiceTimerInterval);
      document.getElementById('micBtn').classList.remove('recording');

      const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
      const formData = new FormData();
      formData.append('audio', audioBlob, 'recording.webm');

      try {
        document.getElementById('voiceStatus').textContent = 'Transcribing audio...';
        const resp = await fetch('/api/transcribe', { method: 'POST', body: formData });
        const data = await resp.json();

        if (data.text) {
          document.getElementById('voiceTranscript').textContent = data.text;
          document.getElementById('voiceTranscript').classList.add('has-text');
          document.getElementById('voiceStatus').textContent = 'Parsing hand...';

          // Parse and auto-fill
          parseVoiceToHand(data.text);
          document.getElementById('voiceStatus').textContent = 'Done! Hand updated.';

          setTimeout(() => {
            document.getElementById('voiceOverlay').classList.remove('active');
            document.getElementById('voiceTimer').textContent = '0:00';
          }, 1500);
        } else {
          document.getElementById('voiceStatus').textContent = 'Could not transcribe. Try again.';
          document.getElementById('voiceStopBtn').disabled = false;
          document.getElementById('voiceStopBtn').textContent = 'Retry';
          document.getElementById('voiceStopBtn').classList.remove('processing');
        }
      } catch (err) {
        document.getElementById('voiceStatus').textContent = 'Error: ' + err.message;
        document.getElementById('voiceStopBtn').disabled = false;
        document.getElementById('voiceStopBtn').textContent = 'Retry';
        document.getElementById('voiceStopBtn').classList.remove('processing');
      }
      resolve();
    };
    mediaRecorder.stop();
  });
}

function parseVoiceToHand(text) {
  const t = text.toLowerCase();

  // Parse blinds
  const blindsMatch = t.match(/(\d+)[\/\-](\d+)/);
  if (blindsMatch) {
    const blindsVal = blindsMatch[1] + '/' + blindsMatch[2];
    const blindsSelect = document.getElementById('blinds');
    for (let opt of blindsSelect.options) {
      if (opt.value === blindsVal) { blindsSelect.value = blindsVal; break; }
    }
  }

  // Parse straddle
  const straddleMatch = t.match(/strad(?:dle)?\s*(?:of\s*)?(?:\$)?(\d+)/i);
  if (straddleMatch) {
    document.getElementById('straddle').value = straddleMatch[1];
  }

  // Parse table size
  const tableSizeMatch = t.match(/(\d)\s*(?:max|handed|players)/);
  if (tableSizeMatch) {
    const size = parseInt(tableSizeMatch[1]);
    if (size >= 5 && size <= 9) {
      changeTableSize(size);
    }
  }

  // Parse hero cards
  const cardMap = {
    'ace': 'A', 'king': 'K', 'queen': 'Q', 'jack': 'J', 'ten': '10',
    'nine': '9', 'eight': '8', 'seven': '7', 'six': '6', 'five': '5',
    'four': '4', 'three': '3', 'two': '2', 'deuce': '2',
    'a': 'A', 'k': 'K', 'q': 'Q', 'j': 'J', 't': '10'
  };
  const suitMap = {
    'spade': '♠', 'spades': '♠', 'heart': '♥', 'hearts': '♥',
    'diamond': '♦', 'diamonds': '♦', 'club': '♣', 'clubs': '♣',
    'of spades': '♠', 'of hearts': '♥', 'of diamonds': '♦', 'of clubs': '♣'
  };
  const suitColorMap = { '♠': 'black', '♥': 'red', '♦': 'red', '♣': 'black' };

  function parseCard(str) {
    str = str.trim().toLowerCase();
    // Try "ace of spades" format
    for (const [name, rank] of Object.entries(cardMap)) {
      for (const [suitName, suit] of Object.entries(suitMap)) {
        if (str.includes(name) && str.includes(suitName.replace('of ', ''))) {
          return { rank, suit, color: suitColorMap[suit] };
        }
      }
    }
    // Try shorthand "Ah", "Ks" etc
    const shortMatch = str.match(/([akqjt2-9]|10)([shdc♠♥♦♣])/i);
    if (shortMatch) {
      const rank = cardMap[shortMatch[1].toLowerCase()] || shortMatch[1].toUpperCase();
      const suitChar = shortMatch[2].toLowerCase();
      const suitLookup = { s: '♠', h: '♥', d: '♦', c: '♣', '♠': '♠', '♥': '♥', '♦': '♦', '♣': '♣' };
      const suit = suitLookup[suitChar] || '♠';
      return { rank, suit, color: suitColorMap[suit] };
    }
    return null;
  }

  // Try to find "I had X Y" or "my hand was X Y" or "pocket X"
  const heroHandMatch = t.match(/(?:i had|i have|my hand|i got|holding|pocket)\s+(.+?)(?:\.|,|on|from|in|$)/i);
  if (heroHandMatch) {
    const handStr = heroHandMatch[1];
    // Pocket pair
    const pocketMatch = handStr.match(/pocket\s+(\w+)/);
    if (pocketMatch) {
      const rank = cardMap[pocketMatch[1]] || pocketMatch[1].toUpperCase();
      if (rank) {
        // Assign two cards of that rank with different suits
        const heroIdx = seats.findIndex(s => s.isHero);
        const idx = heroIdx >= 0 ? heroIdx : 0;
        seats[idx].isHero = true;
        seats[idx].cards[0] = { rank, suit: '♠', color: 'black' };
        seats[idx].cards[1] = { rank, suit: '♥', color: 'red' };
        usedCards.add(rank + '♠');
        usedCards.add(rank + '♥');
      }
    }
  }

  // Parse hero position
  const posMap = {
    'utg': 'UTG', 'utg+1': 'UTG+1', 'utg plus 1': 'UTG+1',
    'mp': 'MP', 'middle position': 'MP', 'mp+1': 'MP+1',
    'hijack': 'HJ', 'hj': 'HJ',
    'cutoff': 'CO', 'co': 'CO', 'cut off': 'CO',
    'button': 'BTN', 'btn': 'BTN', 'dealer': 'BTN',
    'small blind': 'SB', 'sb': 'SB',
    'big blind': 'BB', 'bb': 'BB'
  };

  const posMatch = t.match(/(?:i(?:'m| am| was)?\s+(?:on|in|at|from)\s+(?:the\s+)?|my position (?:is|was)\s+)([\w\s+]+?)(?:\.|,|and|with|$)/i);
  if (posMatch) {
    const posStr = posMatch[1].trim().toLowerCase();
    const pos = posMap[posStr];
    if (pos) {
      const positions = getPositions();
      const posIdx = positions.indexOf(pos);
      if (posIdx >= 0) {
        // Set dealer so hero ends up in that position
        const heroIdx = seats.findIndex(s => s.isHero);
        const idx = heroIdx >= 0 ? heroIdx : 0;
        seats[idx].isHero = true;
        dealerSeatIdx = (idx - posIdx + tableSize) % tableSize;
      }
    }
  }

  // Parse result
  if (t.includes('won') || t.includes('i win') || t.includes('took it down') || t.includes('scooped')) {
    handResult = 'won';
    document.querySelectorAll('.result-btn').forEach(b => b.classList.remove('active'));
    document.querySelector('[onclick*="won"]')?.classList.add('active');
  } else if (t.includes('lost') || t.includes('i lose') || t.includes('busted')) {
    handResult = 'lost';
    document.querySelectorAll('.result-btn').forEach(b => b.classList.remove('active'));
    document.querySelector('[onclick*="lost"]')?.classList.add('active');
  }

  renderTable();
  renderBoard();
}

initSeats();
renderBoard();
