<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Poker Hand Builder</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap');

*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#0a0e17;--card-bg:#151b2b;--border:#2a3550;
  --gold:#ffd700;--green:#4ade80;--red:#f87171;
  --text:#e0e0e0;--muted:#8b9dc3;--dim:#5a6a8a;
  --felt:#1a5c2a;--felt-border:#2d6b3f;
}
html,body{height:100%;font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden;-webkit-tap-highlight-color:transparent;}

/* ---- HEADER ---- */
.header{background:linear-gradient(135deg,#1a1f2e,#0d1117,#1a2332);border-bottom:2px solid var(--felt-border);padding:14px 16px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100;}
.header h1{font-size:1.1rem;font-weight:900;background:linear-gradient(135deg,#ffd700,#ffaa00);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.header-actions{display:flex;gap:8px;}
.btn-sm{font-size:.7rem;padding:5px 12px;border-radius:6px;border:1px solid var(--border);background:var(--card-bg);color:var(--muted);cursor:pointer;font-weight:600;font-family:inherit;transition:all .2s;}
.btn-sm:hover,.btn-sm.active{border-color:var(--gold);color:var(--gold);}
.btn-gold{background:linear-gradient(135deg,#ffd700,#ffaa00);color:#0a0e17;border:none;font-weight:700;padding:6px 14px;border-radius:6px;cursor:pointer;font-family:inherit;font-size:.75rem;}
.btn-gold:hover{filter:brightness(1.1);}
.menu-wrap{position:relative;}
.dropdown-menu{display:none;position:absolute;top:100%;right:0;margin-top:6px;background:var(--card-bg);border:1px solid var(--border);border-radius:10px;min-width:160px;z-index:200;overflow:hidden;box-shadow:0 8px 24px rgba(0,0,0,.5);}
.dropdown-menu.open{display:block;}
.dropdown-menu button{display:block;width:100%;text-align:left;padding:11px 16px;background:none;border:none;color:var(--text);font-family:inherit;font-size:.82rem;font-weight:500;cursor:pointer;transition:background .15s;}
.dropdown-menu button:hover{background:rgba(255,215,0,.1);}
.menu-divider{height:1px;background:var(--border);margin:2px 0;}

.load-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.85);z-index:1000;align-items:center;justify-content:center;}
.load-overlay.active{display:flex;}
.load-modal{background:var(--card-bg);border:1px solid var(--border);border-radius:16px;padding:20px;width:92%;max-width:380px;max-height:80vh;display:flex;flex-direction:column;}
.load-modal h2{font-size:1rem;font-weight:700;color:var(--gold);margin-bottom:12px;}
.load-list{flex:1;overflow-y:auto;margin-bottom:12px;}
.load-item{padding:12px;border:1px solid var(--border);border-radius:8px;margin-bottom:8px;cursor:pointer;transition:all .2s;}
.load-item:hover{border-color:var(--gold);background:rgba(255,215,0,.05);}
.load-item .li-name{font-weight:600;color:var(--text);font-size:.85rem;}
.load-item .li-date{font-size:.7rem;color:var(--dim);margin-top:2px;}
.load-item .li-info{font-size:.72rem;color:var(--muted);margin-top:4px;}
.load-item-actions{display:flex;gap:8px;margin-top:6px;}
.load-item-actions button{font-size:.65rem;padding:3px 8px;border-radius:4px;border:1px solid var(--border);background:none;color:var(--muted);cursor:pointer;font-family:inherit;}
.load-item-actions .delete-btn{border-color:#6b2d2d;color:var(--red);}
.load-empty{text-align:center;color:var(--dim);padding:24px;font-size:.85rem;}
.load-close{background:none;border:1px solid var(--border);color:var(--muted);padding:8px;border-radius:8px;cursor:pointer;font-family:inherit;font-size:.82rem;font-weight:600;width:100%;}

.save-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.85);z-index:1000;align-items:center;justify-content:center;}
.save-overlay.active{display:flex;}
.save-modal{background:var(--card-bg);border:1px solid var(--border);border-radius:16px;padding:20px;width:92%;max-width:340px;}
.save-modal h2{font-size:1rem;font-weight:700;color:var(--gold);margin-bottom:12px;}
.save-modal input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px 12px;color:var(--text);font-family:inherit;font-size:.85rem;margin-bottom:12px;}
.save-modal-actions{display:flex;gap:8px;}
.save-modal-actions button{flex:1;padding:10px;border-radius:8px;cursor:pointer;font-family:inherit;font-size:.82rem;font-weight:600;}
.save-cancel{background:none;border:1px solid var(--border);color:var(--muted);}
.save-confirm{background:var(--gold);border:none;color:#0a0e17;font-weight:700;}
.toast{display:none;position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--green);color:#0a0e17;padding:10px 20px;border-radius:8px;font-size:.82rem;font-weight:600;z-index:2000;box-shadow:0 4px 12px rgba(0,0,0,.3);}
.toast.show{display:block;animation:toast-in .3s ease;}
@keyframes toast-in{from{opacity:0;transform:translateX(-50%) translateY(10px);}to{opacity:1;transform:translateX(-50%) translateY(0);}}

.recap-quiz-prompt{text-align:center;padding:16px;margin-top:12px;background:rgba(255,215,0,.08);border:1px dashed var(--gold);border-radius:10px;color:var(--gold);font-size:.9rem;font-weight:700;}

.quiz-options{display:flex;flex-direction:column;gap:8px;}
.quiz-option{display:block;width:100%;text-align:left;padding:12px 14px;background:var(--bg);border:1px solid var(--border);border-radius:10px;cursor:pointer;transition:all .15s;font-family:inherit;}
.quiz-option:hover{border-color:var(--gold);background:rgba(255,215,0,.05);}
.qo-title{display:block;font-size:.85rem;font-weight:600;color:var(--text);}
.qo-desc{display:block;font-size:.7rem;color:var(--dim);margin-top:2px;}

.btn-mic{background:none;border:2px solid var(--red);color:var(--red);font-size:1.1rem;padding:4px 10px;border-radius:50%;cursor:pointer;transition:all .2s;line-height:1;}
.btn-mic:hover,.btn-mic.recording{background:var(--red);color:#fff;box-shadow:0 0 12px rgba(248,113,113,.5);}
.btn-mic.recording{animation:pulse-mic 1.2s infinite;}
@keyframes pulse-mic{0%,100%{box-shadow:0 0 8px rgba(248,113,113,.4);}50%{box-shadow:0 0 20px rgba(248,113,113,.8);}}

.voice-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.85);z-index:1000;align-items:center;justify-content:center;}
.voice-overlay.active{display:flex;}
.voice-modal{background:var(--card-bg);border:1px solid var(--border);border-radius:20px;padding:32px 24px;text-align:center;width:90%;max-width:340px;}
.voice-animation{position:relative;width:80px;height:80px;margin:0 auto 16px;}
.pulse-ring{position:absolute;top:0;left:0;right:0;bottom:0;border:2px solid var(--red);border-radius:50%;animation:pulse-ring 1.5s infinite;}
@keyframes pulse-ring{0%{transform:scale(1);opacity:1;}100%{transform:scale(1.8);opacity:0;}}
.mic-icon{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:2rem;}
.voice-status{font-size:.9rem;font-weight:600;color:var(--text);margin-bottom:4px;}
.voice-timer{font-size:2rem;font-weight:700;color:var(--gold);margin-bottom:12px;font-variant-numeric:tabular-nums;}
.voice-transcript{font-size:.8rem;color:var(--muted);min-height:40px;margin-bottom:16px;max-height:120px;overflow-y:auto;line-height:1.4;padding:8px;background:rgba(0,0,0,.3);border-radius:8px;display:none;}
.voice-transcript.has-text{display:block;}
.voice-actions{display:flex;gap:12px;justify-content:center;}
.btn-voice-cancel{background:none;border:1px solid var(--border);color:var(--muted);padding:10px 24px;border-radius:8px;cursor:pointer;font-family:inherit;font-size:.85rem;font-weight:600;}
.btn-voice-stop{background:var(--red);border:none;color:#fff;padding:10px 24px;border-radius:8px;cursor:pointer;font-family:inherit;font-size:.85rem;font-weight:700;}
.btn-voice-stop:disabled{opacity:.5;cursor:not-allowed;}
.btn-voice-stop.processing{background:var(--gold);color:#0a0e17;}

/* ---- TABS ---- */
.main-tabs{display:flex;border-bottom:1px solid var(--border);background:#0d1117;position:sticky;top:52px;z-index:99;}
.main-tab{flex:1;text-align:center;padding:10px 0;font-size:.75rem;font-weight:600;color:var(--dim);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;text-transform:uppercase;letter-spacing:.5px;}
.main-tab.active{color:var(--gold);border-bottom-color:var(--gold);}

/* ---- GAME INFO BAR ---- */
.game-info{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;padding:12px;background:#0d1117;}
.info-field label{font-size:.6rem;color:var(--dim);text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:3px;}
.info-field input,.info-field select{width:100%;background:var(--card-bg);border:1px solid var(--border);border-radius:6px;padding:6px 8px;color:var(--text);font-family:inherit;font-size:.8rem;}
.info-field select{-webkit-appearance:none;appearance:none;}

/* ---- TABLE VIEW ---- */
.table-section{padding:12px;position:relative;}
.table-container{position:relative;width:100%;max-width:400px;margin:0 auto;aspect-ratio:1.5/1;}
.poker-table{position:absolute;top:15%;left:10%;width:80%;height:70%;background:radial-gradient(ellipse,#1e6b35,#174f28,#0f3a1c);border-radius:50%;border:4px solid var(--felt-border);box-shadow:0 0 40px rgba(30,107,53,.3),inset 0 0 30px rgba(0,0,0,.3);}
.poker-table::before{content:'';position:absolute;top:8%;left:8%;right:8%;bottom:8%;border:1px solid rgba(255,255,255,.08);border-radius:50%;}
.pot-display{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;}
.pot-display .pot-label{font-size:.55rem;color:rgba(255,255,255,.5);text-transform:uppercase;letter-spacing:1px;}
.pot-display .pot-amount{font-size:1.1rem;font-weight:700;color:var(--gold);}

.seat{position:absolute;width:56px;display:flex;flex-direction:column;align-items:center;cursor:pointer;transform:translate(-50%,-50%);transition:all .2s;z-index:10;}
.seat:hover .seat-circle{border-color:var(--gold);}
.seat.selected .seat-circle{border-color:var(--gold);box-shadow:0 0 12px rgba(255,215,0,.4);}
.seat.hero .seat-circle{border-color:var(--green);box-shadow:0 0 12px rgba(74,222,128,.3);}
.seat-circle{width:42px;height:42px;border-radius:50%;background:var(--card-bg);border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:.65rem;font-weight:700;color:var(--muted);transition:all .2s;}
.seat-name{font-size:.55rem;color:var(--muted);margin-top:2px;max-width:56px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-align:center;}
.seat-stack{font-size:.5rem;color:var(--dim);}
.seat-cards{display:flex;gap:1px;margin-top:2px;}
.seat-cards .mini-card{width:18px;height:25px;background:#fff;border-radius:2px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:.4rem;font-weight:700;line-height:1;box-shadow:0 1px 3px rgba(0,0,0,.3);}
.mini-card.red{color:#dc2626;}
.mini-card.black{color:#1a1a1a;}
.mini-card.face-down{background:linear-gradient(135deg,#2563eb,#1d4ed8);color:transparent;}
.mini-card.face-down::after{content:'';position:absolute;width:12px;height:17px;border:1px solid rgba(255,255,255,.15);border-radius:1px;}

.seat-position{font-size:.5rem;font-weight:700;color:var(--gold);margin-top:1px;}
.seat-action{font-size:.5rem;padding:1px 4px;border-radius:3px;margin-top:1px;font-weight:600;}
.action-fold{background:#3b1f1f;color:var(--red);}
.action-check{background:#1a2a1a;color:var(--green);}
.action-call{background:#1a2a3a;color:#60a5fa;}
.action-bet,.action-raise{background:#3b2a1a;color:#fbbf24;}
.action-allin{background:#4a1a1a;color:#ff6b6b;}

.dealer-btn{position:absolute;width:22px;height:22px;border-radius:50%;background:linear-gradient(135deg,#fff,#e0e0e0);color:#1a1a1a;font-size:.55rem;font-weight:900;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 6px rgba(0,0,0,.4);cursor:pointer;z-index:15;transition:all .3s;transform:translate(-50%,-50%);}

/* ---- BOARD ---- */
.board-section{padding:12px;text-align:center;}
.board-title{font-size:.7rem;color:var(--dim);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;}
.board-cards-row{display:flex;justify-content:center;gap:6px;align-items:center;min-height:66px;}
.board-slot{width:44px;height:62px;border:2px dashed var(--border);border-radius:6px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;position:relative;}
.board-slot:hover{border-color:var(--gold);}
.board-slot.filled{border:none;}
.board-divider{width:1px;height:40px;background:var(--border);margin:0 4px;}
.board-street-label{font-size:.5rem;color:var(--dim);position:absolute;bottom:-14px;text-transform:uppercase;letter-spacing:.5px;}

.card{width:44px;height:62px;background:#fff;border-radius:6px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-weight:700;box-shadow:0 2px 8px rgba(0,0,0,.3);line-height:1.1;cursor:pointer;transition:transform .15s;}
.card .rank{font-size:1rem;}
.card .suit{font-size:.9rem;}
.card.red{color:#dc2626;}
.card.black{color:#1a1a1a;}
.card:hover{transform:scale(1.05);}

/* ---- CARD PICKER MODAL ---- */
.modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);z-index:200;justify-content:center;align-items:flex-end;backdrop-filter:blur(4px);}
.modal-overlay.open{display:flex;}
.modal{background:var(--bg);border-top:2px solid var(--gold);border-radius:16px 16px 0 0;width:100%;max-width:420px;max-height:85vh;overflow-y:auto;padding:16px;animation:slideUp .3s ease;}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-title{font-size:.85rem;font-weight:700;color:var(--gold);margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;}
.modal-close{background:none;border:none;color:var(--muted);font-size:1.2rem;cursor:pointer;padding:4px;}

.card-grid{display:grid;grid-template-columns:repeat(13,1fr);gap:3px;margin-bottom:8px;}
.card-pick{width:100%;aspect-ratio:.65;background:#fff;border-radius:4px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:.5rem;font-weight:700;cursor:pointer;transition:all .15s;line-height:1;border:2px solid transparent;}
.card-pick:hover{transform:scale(1.1);z-index:1;}
.card-pick.selected{border-color:var(--gold);box-shadow:0 0 8px rgba(255,215,0,.5);}
.card-pick.used{opacity:.2;pointer-events:none;}
.card-pick.red{color:#dc2626;}
.card-pick.black{color:#1a1a1a;}

.suit-label{font-size:.6rem;color:var(--muted);padding:4px 0 2px;font-weight:600;}

/* ---- SEAT EDIT PANEL ---- */
.seat-panel{background:var(--card-bg);border:1px solid var(--border);border-radius:12px;padding:16px;margin:12px;}
.seat-panel-title{font-size:.8rem;font-weight:700;color:var(--gold);margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;}
.seat-panel-row{display:flex;gap:8px;margin-bottom:8px;align-items:center;}
.seat-panel-row label{font-size:.65rem;color:var(--dim);width:50px;flex-shrink:0;text-transform:uppercase;}
.seat-panel-row input{flex:1;background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:6px 8px;color:var(--text);font-family:inherit;font-size:.8rem;}
.hero-toggle{display:flex;gap:6px;}
.hero-toggle .btn-sm{font-size:.65rem;padding:4px 10px;}

/* ---- STREET ACTIONS ---- */
.street-section{padding:12px;}
.street-tabs{display:flex;gap:4px;margin-bottom:12px;}
.street-tab{flex:1;text-align:center;padding:8px 0;font-size:.7rem;font-weight:600;color:var(--dim);cursor:pointer;border-radius:6px;background:var(--card-bg);border:1px solid var(--border);transition:all .2s;text-transform:uppercase;}
.street-tab.active{border-color:var(--gold);color:var(--gold);background:#1a1f2e;}
.street-tab .street-pot{font-size:.55rem;color:var(--dim);display:block;margin-top:2px;}
.action-board{display:none;justify-content:center;gap:4px;padding:8px 0;align-items:center;}
.action-board.visible{display:flex;}
.action-board .mini-board-card{width:36px;height:50px;border-radius:5px;background:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;font-weight:700;font-size:.7rem;box-shadow:0 1px 4px rgba(0,0,0,.3);}
.action-board .mini-board-card.red{color:#dc2626;}
.action-board .mini-board-card.black{color:#1a1a1a;}
.action-board .mini-board-card.empty{background:rgba(42,53,80,.3);border:1px dashed var(--border);}
.action-board .mini-divider{width:1px;height:30px;background:var(--border);margin:0 2px;}

.active-players{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px;}
.player-chip{display:flex;align-items:center;gap:4px;padding:4px 10px;border-radius:20px;background:var(--card-bg);border:1px solid var(--border);cursor:pointer;transition:all .2s;font-size:.7rem;font-weight:600;color:var(--muted);}
.player-chip.folded{opacity:.3;text-decoration:line-through;}
.player-chip:hover{border-color:var(--gold);}
.player-chip.acting{border-color:var(--gold);color:var(--gold);}
.player-chip .chip-pos{font-size:.55rem;color:var(--dim);}

.action-buttons{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px;display:none;}
.action-buttons.visible{display:flex;}
.action-btn{padding:8px 14px;border-radius:8px;border:1px solid var(--border);background:var(--card-bg);color:var(--text);font-family:inherit;font-size:.75rem;font-weight:600;cursor:pointer;transition:all .2s;}
.action-btn:hover{border-color:var(--gold);}
.action-btn.fold{border-color:#f87171;color:#f87171;}
.action-btn.check{border-color:var(--green);color:var(--green);}
.action-btn.call{border-color:#60a5fa;color:#60a5fa;}
.action-btn.bet,.action-btn.raise{border-color:#fbbf24;color:#fbbf24;}
.action-btn.allin{border-color:#ff6b6b;color:#ff6b6b;background:#2a1010;}
.amount-input{width:80px;background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:6px 8px;color:var(--text);font-family:inherit;font-size:.8rem;display:none;}
.amount-input.visible{display:block;}

.action-timeline{margin-top:8px;}
.timeline-entry{display:flex;align-items:center;gap:8px;padding:8px 6px;font-size:.78rem;border-bottom:1px solid rgba(42,53,80,.3);cursor:pointer;border-radius:6px;transition:background .15s;}
.timeline-entry:hover{background:rgba(255,215,0,.05);}
.timeline-entry:active{background:rgba(255,215,0,.1);}
.timeline-player{font-weight:600;color:var(--muted);min-width:50px;}
.timeline-action{font-weight:600;}
.timeline-amount{color:var(--gold);font-weight:600;}
.timeline-delete{background:none;border:none;color:var(--dim);cursor:pointer;font-size:.75rem;margin-left:auto;padding:4px 8px;}
.timeline-delete:hover{color:var(--red);}
.timeline-edit-hint{font-size:.6rem;color:var(--dim);margin-left:4px;}

.edit-action-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.85);z-index:1000;align-items:flex-end;justify-content:center;}
.edit-action-overlay.active{display:flex;}
.edit-action-modal{background:var(--card-bg);border:1px solid var(--border);border-radius:16px 16px 0 0;padding:20px;width:100%;max-width:500px;}
.edit-action-modal h3{font-size:.9rem;font-weight:700;color:var(--gold);margin-bottom:14px;}
.edit-action-types{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px;}
.edit-action-types button{padding:8px 16px;border-radius:8px;border:1px solid var(--border);background:var(--card-bg);color:var(--muted);cursor:pointer;font-family:inherit;font-size:.8rem;font-weight:600;transition:all .15s;}
.edit-action-types button.active{border-color:var(--gold);color:var(--gold);background:rgba(255,215,0,.1);}
.edit-amount-row{display:flex;gap:8px;align-items:center;margin-bottom:16px;}
.edit-amount-row label{font-size:.75rem;color:var(--dim);font-weight:600;}
.edit-amount-row input{flex:1;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px 12px;color:var(--text);font-family:inherit;font-size:.9rem;}
.edit-action-btns{display:flex;gap:8px;}
.edit-action-btns button{flex:1;padding:11px;border-radius:8px;cursor:pointer;font-family:inherit;font-size:.82rem;font-weight:600;}
.edit-save-btn{background:var(--gold);border:none;color:#0a0e17;font-weight:700;}
.edit-cancel-btn{background:none;border:1px solid var(--border);color:var(--muted);}

/* ---- RESULT SECTION ---- */
.result-section{padding:12px;}
.result-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;}
.result-btn{padding:12px;border-radius:8px;border:1px solid var(--border);background:var(--card-bg);color:var(--muted);font-family:inherit;font-size:.8rem;font-weight:600;cursor:pointer;text-align:center;transition:all .2s;}
.result-btn.won{border-color:var(--green);color:var(--green);}
.result-btn.won.active{background:rgba(74,222,128,.1);}
.result-btn.lost{border-color:var(--red);color:var(--red);}
.result-btn.lost.active{background:rgba(248,113,113,.1);}

.tags-container{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px;}
.tag-btn{font-size:.65rem;padding:4px 10px;border-radius:20px;border:1px solid var(--border);background:var(--card-bg);color:var(--muted);cursor:pointer;font-weight:600;transition:all .2s;font-family:inherit;}
.tag-btn.active{border-color:var(--gold);color:var(--gold);background:rgba(255,215,0,.08);}
.tag-bluff.active{border-color:#c084fc;color:#c084fc;background:#3b1f4a;}
.tag-cooler.active{border-color:#fbbf24;color:#fbbf24;background:#3b2a1a;}
.tag-herofold.active{border-color:#60a5fa;color:#60a5fa;background:#1a2a4a;}
.tag-value.active{border-color:var(--green);color:var(--green);background:#1a3a2a;}
.tag-slowplay.active{border-color:#e879f9;color:#e879f9;background:#3b1a3b;}
.tag-3bet.active{border-color:#fb923c;color:#fb923c;background:#3b2a1a;}

.notes-field{width:100%;min-height:80px;background:var(--card-bg);border:1px solid var(--border);border-radius:8px;padding:10px;color:var(--text);font-family:inherit;font-size:.8rem;resize:vertical;}

/* ---- RECAP ---- */
.recap-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.85);z-index:300;overflow-y:auto;padding:16px;}
.recap-overlay.open{display:block;}
.recap-container{max-width:500px;margin:0 auto;}
.recap-top-bar{position:fixed;top:0;left:0;right:0;z-index:301;display:flex;justify-content:space-between;align-items:center;padding:10px 16px;background:rgba(10,14,23,.9);backdrop-filter:blur(8px);}
.recap-close{background:var(--card-bg);border:1px solid var(--border);border-radius:50%;width:36px;height:36px;display:flex;align-items:center;justify-content:center;color:var(--muted);cursor:pointer;font-size:1.1rem;}
.recap-share-btn{background:linear-gradient(135deg,#25D366,#128C7E);border:none;color:#fff;padding:8px 18px;border-radius:8px;cursor:pointer;font-family:inherit;font-size:.82rem;font-weight:700;transition:all .15s;}
.recap-share-btn:hover{filter:brightness(1.1);}
.recap-share-btn:disabled{opacity:.5;cursor:not-allowed;}
.recap-container{padding-top:56px;}

.recap-card{background:linear-gradient(145deg,#151b2b,#1a2236);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:16px;}
.recap-header{text-align:center;margin-bottom:16px;}
.recap-header h2{font-size:1.2rem;font-weight:900;background:linear-gradient(135deg,#ffd700,#ffaa00);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.recap-header .recap-meta{font-size:.75rem;color:var(--dim);margin-top:4px;}
.recap-positions{display:flex;gap:8px;margin-bottom:8px;flex-wrap:wrap;}
.recap-position{font-size:.7rem;padding:2px 8px;border-radius:4px;background:#1e2a40;color:var(--muted);font-weight:600;}
.recap-cards-row{display:flex;align-items:center;gap:16px;margin-bottom:12px;flex-wrap:wrap;}
.recap-cards-group{display:flex;gap:4px;}
.recap-vs{font-size:.75rem;color:var(--dim);font-weight:600;text-transform:uppercase;}
.recap-board-label{font-size:.7rem;color:var(--dim);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;}
.recap-board-cards{display:flex;gap:4px;margin-bottom:8px;}
.recap-board-cards .card{width:40px;height:56px;font-size:.8rem;}
.recap-street{margin-bottom:8px;}
.recap-street-title{font-size:.7rem;color:var(--gold);font-weight:700;margin-bottom:4px;text-transform:uppercase;}
.recap-street-actions{font-size:.75rem;color:var(--muted);line-height:1.6;}
.recap-result{text-align:center;padding:12px;border-radius:8px;margin-top:8px;}
.recap-result.won{background:rgba(74,222,128,.1);border:1px solid rgba(74,222,128,.3);}
.recap-result.lost{background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.3);}
.recap-result .result-text{font-size:1rem;font-weight:700;}
.recap-result .result-pot{font-size:.8rem;color:var(--muted);margin-top:2px;}
.recap-tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px;justify-content:center;}
.recap-tag{font-size:.65rem;padding:3px 10px;border-radius:20px;font-weight:600;}
.recap-notes{font-size:.8rem;color:var(--muted);line-height:1.5;margin-top:12px;padding-top:12px;border-top:1px solid #1e2a40;white-space:pre-wrap;}

/* ---- SCROLLBAR ---- */
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}

/* Section divider */
.section-divider{height:1px;background:var(--border);margin:0;}

/* Tab content */
.tab-content{display:none;}
.tab-content.active{display:block;}
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <h1>Hand Builder</h1>
  <div class="header-actions">
    <select class="btn-sm" id="tableToggle" onchange="changeTableSize(parseInt(this.value))">
      <option value="5">5-max</option>
      <option value="6" selected>6-max</option>
      <option value="7">7-max</option>
      <option value="8">8-max</option>
      <option value="9">9-max</option>
    </select>
    <button class="btn-mic" id="micBtn" onclick="toggleVoiceRecording()">&#127908;</button>
    <div class="menu-wrap">
      <button class="btn-sm" onclick="toggleMenu()">&#9776;</button>
      <div class="dropdown-menu" id="dropdownMenu">
        <button onclick="newHand()">New Hand</button>
        <button onclick="saveHand()">Save</button>
        <button onclick="saveHandAs()">Save As...</button>
        <button onclick="openLoadModal()">Load Hand</button>
        <div class="menu-divider"></div>
        <button onclick="generateRecap('full')">Full Recap</button>
        <button onclick="openQuizRecap()">Quiz Recap...</button>
      </div>
    </div>
  </div>
</div>

<!-- Quiz recap picker -->
<div class="save-overlay" id="quizOverlay">
  <div class="save-modal" style="max-width:360px;">
    <h2 style="color:var(--gold);font-size:1rem;margin-bottom:4px;">Quiz Recap</h2>
    <p style="font-size:.75rem;color:var(--dim);margin-bottom:14px;">Pick where to stop — share as a question, reveal the answer later.</p>
    <div class="quiz-options" id="quizOptions">
      <button class="quiz-option" onclick="generateRecap('after-preflop')">
        <span class="qo-title">After Preflop</span>
        <span class="qo-desc">What would you do on the flop?</span>
      </button>
      <button class="quiz-option" onclick="generateRecap('after-flop')">
        <span class="qo-title">After Flop Action</span>
        <span class="qo-desc">What's your turn play?</span>
      </button>
      <button class="quiz-option" onclick="generateRecap('after-turn')">
        <span class="qo-title">After Turn Action</span>
        <span class="qo-desc">River decision?</span>
      </button>
      <button class="quiz-option" onclick="generateRecap('before-showdown')">
        <span class="qo-title">Before Showdown</span>
        <span class="qo-desc">What did villain have?</span>
      </button>
    </div>
    <button class="load-close" style="margin-top:12px;" onclick="document.getElementById('quizOverlay').classList.remove('active')">Cancel</button>
  </div>
</div>

<!-- Edit action modal -->
<div class="edit-action-overlay" id="editActionOverlay">
  <div class="edit-action-modal">
    <h3 id="editActionTitle">Edit Action</h3>
    <div class="edit-action-types" id="editActionTypes">
      <button onclick="setEditAction('fold')">Fold</button>
      <button onclick="setEditAction('check')">Check</button>
      <button onclick="setEditAction('call')">Call</button>
      <button onclick="setEditAction('bet')">Bet</button>
      <button onclick="setEditAction('raise')">Raise</button>
      <button onclick="setEditAction('allin')">All-in</button>
    </div>
    <div class="edit-amount-row" id="editAmountRow">
      <label>Amount $</label>
      <input type="number" id="editAmountInput" placeholder="0">
    </div>
    <div class="edit-action-btns">
      <button class="edit-cancel-btn" onclick="closeEditAction()">Cancel</button>
      <button class="edit-save-btn" onclick="confirmEditAction()">Save</button>
    </div>
  </div>
</div>

<!-- Save As modal -->
<div class="save-overlay" id="saveOverlay">
  <div class="save-modal">
    <h2>Save Hand As</h2>
    <input type="text" id="saveNameInput" placeholder="Hand name (e.g. ATs vs BB at Lucky Chances)">
    <div class="save-modal-actions">
      <button class="save-cancel" onclick="closeSaveModal()">Cancel</button>
      <button class="save-confirm" onclick="confirmSaveAs()">Save</button>
    </div>
  </div>
</div>

<!-- Load hand modal -->
<div class="load-overlay" id="loadOverlay">
  <div class="load-modal">
    <h2>Load Hand</h2>
    <div class="load-list" id="loadList"></div>
    <button class="load-close" onclick="closeLoadModal()">Close</button>
  </div>
</div>

<!-- Toast notification -->
<div class="toast" id="toast"></div>

<!-- Voice recording overlay -->
<div class="voice-overlay" id="voiceOverlay">
  <div class="voice-modal">
    <div class="voice-animation" id="voiceAnimation">
      <div class="pulse-ring"></div>
      <div class="mic-icon">&#127908;</div>
    </div>
    <div class="voice-status" id="voiceStatus">Recording...</div>
    <div class="voice-timer" id="voiceTimer">0:00</div>
    <div class="voice-transcript" id="voiceTranscript"></div>
    <div class="voice-actions">
      <button class="btn-voice-cancel" onclick="cancelVoiceRecording()">Cancel</button>
      <button class="btn-voice-stop" id="voiceStopBtn" onclick="stopAndTranscribe()">Stop & Process</button>
    </div>
  </div>
</div>

<!-- MAIN TABS -->
<div class="main-tabs">
  <div class="main-tab active" data-tab="setup" onclick="switchMainTab('setup')">Setup</div>
  <div class="main-tab" data-tab="action" onclick="switchMainTab('action')">Action</div>
  <div class="main-tab" data-tab="result" onclick="switchMainTab('result')">Result</div>
</div>

<!-- ===== SETUP TAB ===== -->
<div class="tab-content active" id="tab-setup">

  <!-- Game Info -->
  <div class="game-info">
    <div class="info-field">
      <label>Blinds</label>
      <select id="blinds">
        <option value="1/2">$1/$2</option>
        <option value="1/3">$1/$3</option>
        <option value="2/5">$2/$5</option>
        <option value="3/5">$3/$5</option>
        <option value="5/10">$5/$10</option>
        <option value="10/20">$10/$20</option>
        <option value="25/50">$25/$50</option>
      </select>
    </div>
    <div class="info-field">
      <label>Straddle</label>
      <input type="number" id="straddle" placeholder="0">
    </div>
    <div class="info-field">
      <label>Game</label>
      <select id="gameType">
        <option value="cash">Cash</option>
        <option value="tournament">Tournament</option>
      </select>
    </div>
  </div>

  <div class="section-divider"></div>

  <!-- Table -->
  <div class="table-section">
    <div class="table-container" id="tableContainer">
      <div class="poker-table">
        <div class="pot-display">
          <div class="pot-label">Pot</div>
          <div class="pot-amount" id="potDisplay">0</div>
        </div>
      </div>
      <!-- Seats injected by JS -->
      <!-- Dealer button injected by JS -->
    </div>
  </div>

  <!-- Seat Edit Panel (shown when seat selected) -->
  <div class="seat-panel" id="seatPanel" style="display:none;">
    <div class="seat-panel-title">
      <span id="seatPanelTitle">Seat 1</span>
      <button class="btn-sm" onclick="closeSeatPanel()" style="font-size:.6rem;padding:2px 8px;">Close</button>
    </div>
    <div class="seat-panel-row">
      <label>Name</label>
      <input type="text" id="seatName" placeholder="Player name" oninput="updateSeatName()">
    </div>
    <div class="seat-panel-row">
      <label>Stack</label>
      <input type="number" id="seatStack" placeholder="200" oninput="updateSeatStack()">
    </div>
    <div class="seat-panel-row">
      <label>Role</label>
      <div class="hero-toggle">
        <button class="btn-sm" id="heroBtn" onclick="toggleHero()">Hero</button>
        <button class="btn-sm" onclick="openCardPicker('hole')">Cards</button>
        <button class="btn-sm" onclick="clearSeat()" style="color:var(--red);border-color:var(--red);">Clear</button>
      </div>
    </div>
  </div>

  <div class="section-divider"></div>

  <!-- Board -->
  <div class="board-section">
    <div class="board-title">Community Cards</div>
    <div class="board-cards-row" id="boardRow">
      <div class="board-slot" onclick="openCardPicker('flop',0)"><span class="board-street-label">Flop</span></div>
      <div class="board-slot" onclick="openCardPicker('flop',1)"></div>
      <div class="board-slot" onclick="openCardPicker('flop',2)"></div>
      <div class="board-divider"></div>
      <div class="board-slot" onclick="openCardPicker('turn',0)"><span class="board-street-label">Turn</span></div>
      <div class="board-divider"></div>
      <div class="board-slot" onclick="openCardPicker('river',0)"><span class="board-street-label">River</span></div>
    </div>
  </div>
</div>

<!-- ===== ACTION TAB ===== -->
<div class="tab-content" id="tab-action">
  <div class="street-section">
    <div class="street-tabs">
      <div class="street-tab active" data-street="preflop" onclick="switchStreet('preflop')">Preflop</div>
      <div class="street-tab" data-street="flop" onclick="switchStreet('flop')">Flop</div>
      <div class="street-tab" data-street="turn" onclick="switchStreet('turn')">Turn</div>
      <div class="street-tab" data-street="river" onclick="switchStreet('river')">River</div>
    </div>

    <!-- Board display in action tab -->
    <div class="action-board" id="actionBoard"></div>

    <div class="active-players" id="activePlayers"></div>

    <div class="action-buttons" id="actionButtons">
      <button class="action-btn fold" onclick="logAction('fold')">Fold</button>
      <button class="action-btn check" onclick="logAction('check')">Check</button>
      <button class="action-btn call" onclick="logAction('call')">Call</button>
      <button class="action-btn bet" onclick="logAction('bet')">Bet</button>
      <button class="action-btn raise" onclick="logAction('raise')">Raise</button>
      <button class="action-btn allin" onclick="logAction('allin')">All-in</button>
      <input type="number" class="amount-input" id="actionAmount" placeholder="Amount">
    </div>

    <div id="streetPot" style="text-align:center;padding:8px;font-size:.75rem;color:var(--dim);">
      Pot: <span style="color:var(--gold);font-weight:700;" id="streetPotAmount">0</span>
    </div>

    <div class="action-timeline" id="actionTimeline"></div>
  </div>
</div>

<!-- ===== RESULT TAB ===== -->
<div class="tab-content" id="tab-result">
  <div class="result-section">
    <div style="font-size:.7rem;color:var(--dim);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;">Result</div>
    <div class="result-grid">
      <button class="result-btn won" id="resultWon" onclick="setResult('won')">Won</button>
      <button class="result-btn lost" id="resultLost" onclick="setResult('lost')">Lost</button>
    </div>

    <div style="font-size:.7rem;color:var(--dim);text-transform:uppercase;letter-spacing:1px;margin:12px 0 8px;">Tags</div>
    <div class="tags-container" id="tagsContainer">
      <button class="tag-btn tag-bluff" data-tag="bluff" onclick="toggleTag(this)">Bluff</button>
      <button class="tag-btn tag-cooler" data-tag="cooler" onclick="toggleTag(this)">Cooler</button>
      <button class="tag-btn tag-herofold" data-tag="hero fold" onclick="toggleTag(this)">Hero Fold</button>
      <button class="tag-btn tag-value" data-tag="value bet" onclick="toggleTag(this)">Value Bet</button>
      <button class="tag-btn tag-slowplay" data-tag="slow play" onclick="toggleTag(this)">Slow Play</button>
      <button class="tag-btn tag-3bet" data-tag="3-bet pot" onclick="toggleTag(this)">3-Bet Pot</button>
      <button class="tag-btn" data-tag="squeeze" onclick="toggleTag(this)">Squeeze</button>
      <button class="tag-btn" data-tag="multi-way" onclick="toggleTag(this)">Multi-way</button>
      <button class="tag-btn" data-tag="set mine" onclick="toggleTag(this)">Set Mine</button>
      <button class="tag-btn" data-tag="draw" onclick="toggleTag(this)">Draw</button>
    </div>

    <div style="font-size:.7rem;color:var(--dim);text-transform:uppercase;letter-spacing:1px;margin:12px 0 8px;">Notes</div>
    <textarea class="notes-field" id="handNotes" placeholder="What happened? What did you learn?"></textarea>
  </div>
</div>

<!-- ===== CARD PICKER MODAL ===== -->
<div class="modal-overlay" id="cardPickerModal">
  <div class="modal">
    <div class="modal-title">
      <span id="cardPickerTitle">Select Cards</span>
      <button class="modal-close" onclick="closeCardPicker()">&times;</button>
    </div>
    <div id="cardPickerGrid"></div>
    <div style="text-align:center;margin-top:8px;">
      <button class="btn-gold" onclick="confirmCardPicker()">Done</button>
    </div>
  </div>
</div>

<!-- ===== RECAP OVERLAY ===== -->
<div class="recap-overlay" id="recapOverlay">
  <div class="recap-top-bar">
    <button class="recap-share-btn" onclick="shareRecap()">&#x1F4E4; Share</button>
    <button class="recap-close" onclick="closeRecap()">&times;</button>
  </div>
  <div class="recap-container" id="recapContent"></div>
</div>

<script>
// ==================== STATE ====================
const POSITIONS = {
  5: ['BTN','SB','BB','UTG','CO'],
  6: ['BTN','SB','BB','UTG','MP','CO'],
  7: ['BTN','SB','BB','UTG','MP','HJ','CO'],
  8: ['BTN','SB','BB','UTG','UTG+1','MP','HJ','CO'],
  9: ['BTN','SB','BB','UTG','UTG+1','MP','MP+1','HJ','CO']
};
const SUITS = [
  {symbol:'♠',name:'spades',color:'black'},
  {symbol:'♥',name:'hearts',color:'red'},
  {symbol:'♦',name:'diamonds',color:'red'},
  {symbol:'♣',name:'clubs',color:'black'}
];
const RANKS = ['A','K','Q','J','10','9','8','7','6','5','4','3','2'];

let tableSize = 6;
let dealerSeatIdx = 0;
let selectedSeatIdx = null;
let seats = [];
let board = {flop:[null,null,null], turn:[null], river:[null]};
let usedCards = new Set();
let currentStreet = 'preflop';
let actions = {preflop:[], flop:[], turn:[], river:[]};
let foldedPlayers = new Set();
let handResult = null;
let activeTags = new Set();

// Card picker state
let cardPickerMode = null; // 'hole' | 'flop' | 'turn' | 'river'
let cardPickerSlot = 0;
let cardPickerSelection = [];
let cardPickerMaxCards = 2;
let actingPlayerIdx = null;

// Seat positions around table (percentages of container)
const SEAT_POSITIONS = {
  5: [
    {x:50,y:98},  // BTN
    {x:6,y:68},   // SB
    {x:6,y:28},   // BB
    {x:50,y:2},   // UTG
    {x:94,y:50},  // CO
  ],
  6: [
    {x:50,y:98},  // BTN
    {x:8,y:75},   // SB
    {x:8,y:25},   // BB
    {x:30,y:2},   // UTG
    {x:70,y:2},   // MP
    {x:92,y:50},  // CO
  ],
  7: [
    {x:50,y:98},  // BTN
    {x:10,y:82},  // SB
    {x:4,y:50},   // BB
    {x:16,y:15},  // UTG
    {x:50,y:2},   // MP
    {x:84,y:15},  // HJ
    {x:96,y:50},  // CO
  ],
  8: [
    {x:50,y:98},  // BTN
    {x:12,y:85},  // SB
    {x:4,y:58},   // BB
    {x:4,y:30},   // UTG
    {x:25,y:5},   // UTG+1
    {x:55,y:2},   // MP
    {x:82,y:12},  // HJ
    {x:96,y:45},  // CO
  ],
  9: [
    {x:50,y:98},  // BTN
    {x:15,y:88},  // SB
    {x:4,y:60},   // BB
    {x:4,y:32},   // UTG
    {x:20,y:8},   // UTG+1
    {x:42,y:2},   // MP
    {x:62,y:2},   // MP+1
    {x:82,y:12},  // HJ
    {x:96,y:40},  // CO
  ]
};

const DEALER_OFFSETS = {
  5: [
    {x:48,y:85},{x:16,y:62},{x:16,y:36},{x:48,y:15},{x:84,y:48}
  ],
  6: [
    {x:48,y:85},{x:18,y:68},{x:18,y:34},{x:36,y:15},{x:66,y:15},{x:82,y:48}
  ],
  7: [
    {x:48,y:85},{x:18,y:74},{x:14,y:48},{x:24,y:22},{x:48,y:14},{x:76,y:22},{x:86,y:48}
  ],
  8: [
    {x:48,y:85},{x:20,y:76},{x:14,y:54},{x:14,y:36},{x:32,y:16},{x:54,y:14},{x:76,y:20},{x:86,y:44}
  ],
  9: [
    {x:48,y:85},{x:22,y:78},{x:14,y:55},{x:14,y:38},{x:28,y:18},{x:44,y:12},{x:60,y:12},{x:78,y:20},{x:88,y:42}
  ]
};

function initSeats() {
  seats = [];
  for(let i = 0; i < tableSize; i++) {
    seats.push({name:'', stack:'', cards:[null,null], isHero:false});
  }
  foldedPlayers.clear();
  actions = {preflop:[], flop:[], turn:[], river:[]};
  selectedSeatIdx = null;
  renderTable();
}

function getPositions() { return POSITIONS[tableSize]; }
function getSeatPositions() { return SEAT_POSITIONS[tableSize]; }
function getPositionForSeat(seatIdx) {
  const positions = getPositions();
  const offset = (seatIdx - dealerSeatIdx + tableSize) % tableSize;
  return positions[offset];
}

function renderTable() {
  const container = document.getElementById('tableContainer');
  // Remove old seats and dealer
  container.querySelectorAll('.seat,.dealer-btn').forEach(el => el.remove());

  const seatPos = getSeatPositions();
  const dealerPos = DEALER_OFFSETS[tableSize];

  for(let i = 0; i < tableSize; i++) {
    const s = seats[i];
    const pos = seatPos[i];
    const el = document.createElement('div');
    el.className = 'seat' + (i === selectedSeatIdx ? ' selected' : '') + (s.isHero ? ' hero' : '');
    el.style.left = pos.x + '%';
    el.style.top = pos.y + '%';
    el.onclick = () => selectSeat(i);

    const position = getPositionForSeat(i);
    const displayName = s.isHero ? 'Hero' : (s.name || `S${i+1}`);

    let cardsHTML = '';
    if(s.cards[0] || s.cards[1]) {
      cardsHTML = '<div class="seat-cards">';
      for(let c = 0; c < 2; c++) {
        if(s.cards[c]) {
          const cc = s.cards[c];
          cardsHTML += `<div class="mini-card ${cc.color}"><span>${cc.rank}</span><span>${cc.suit}</span></div>`;
        }
      }
      cardsHTML += '</div>';
    }

    // Show last action on current street
    let actionHTML = '';
    const lastAction = getLastActionForPlayer(i);
    if(lastAction) {
      const cls = 'action-' + lastAction.type;
      const label = lastAction.type === 'allin' ? 'ALL-IN' : lastAction.type.toUpperCase();
      const amt = lastAction.amount ? ` ${lastAction.amount}` : '';
      actionHTML = `<span class="seat-action ${cls}">${label}${amt}</span>`;
    }

    const remainingStack = s.stack ? getRemainingStack(i) : '';
    el.innerHTML = `
      <div class="seat-circle">${displayName.slice(0,3)}</div>
      <div class="seat-name">${displayName}</div>
      ${s.stack ? `<div class="seat-stack">$${remainingStack}</div>` : ''}
      <div class="seat-position">${position}</div>
      ${cardsHTML}
      ${actionHTML}
    `;
    container.appendChild(el);
  }

  // Dealer button
  const dBtn = document.createElement('div');
  dBtn.className = 'dealer-btn';
  dBtn.textContent = 'D';
  dBtn.style.left = dealerPos[dealerSeatIdx].x + '%';
  dBtn.style.top = dealerPos[dealerSeatIdx].y + '%';
  dBtn.onclick = (e) => { e.stopPropagation(); moveDealer(); };
  container.appendChild(dBtn);

  updatePotDisplay();
  renderActivePlayers();
}

function getLastActionForPlayer(seatIdx) {
  const streetActions = actions[currentStreet];
  for(let i = streetActions.length - 1; i >= 0; i--) {
    if(streetActions[i].seatIdx === seatIdx) return streetActions[i];
  }
  return null;
}

function moveDealer() {
  dealerSeatIdx = (dealerSeatIdx + 1) % tableSize;
  renderTable();
}

function selectSeat(idx) {
  selectedSeatIdx = idx;
  const s = seats[idx];
  document.getElementById('seatPanel').style.display = 'block';
  document.getElementById('seatPanelTitle').textContent = `Seat ${idx+1} (${getPositionForSeat(idx)})`;
  document.getElementById('seatName').value = s.name;
  document.getElementById('seatStack').value = s.stack;
  document.getElementById('heroBtn').classList.toggle('active', s.isHero);
  renderTable();
}

function closeSeatPanel() {
  selectedSeatIdx = null;
  document.getElementById('seatPanel').style.display = 'none';
  renderTable();
}

function updateSeatName() {
  if(selectedSeatIdx === null) return;
  seats[selectedSeatIdx].name = document.getElementById('seatName').value;
  renderTable();
}

function updateSeatStack() {
  if(selectedSeatIdx === null) return;
  seats[selectedSeatIdx].stack = document.getElementById('seatStack').value;
  renderTable();
}

function toggleHero() {
  if(selectedSeatIdx === null) return;
  // Clear other hero
  seats.forEach((s,i) => { if(i !== selectedSeatIdx) s.isHero = false; });

function clearSeat() {
  if(selectedSeatIdx === null) return;
  const s = seats[selectedSeatIdx];
  // Remove used cards
  s.cards.forEach(c => { if(c) usedCards.delete(c.rank + c.suit); });
  seats[selectedSeatIdx] = {name:'', stack:'', cards:[null,null], isHero:false};
  closeSeatPanel();
  renderBoard();
}

// ==================== CARD PICKER ====================
function openCardPicker(mode, slot) {
  cardPickerMode = mode;
  cardPickerSlot = slot || 0;
  cardPickerSelection = [];

  if(mode === 'hole') {
    cardPickerMaxCards = 2;
    document.getElementById('cardPickerTitle').textContent = 'Select Hole Cards';
    // Pre-select existing cards
    if(selectedSeatIdx !== null) {
      seats[selectedSeatIdx].cards.forEach(c => {
        if(c) cardPickerSelection.push(c.rank + c.suit);
      });
    }
  } else if(mode === 'flop') {
    cardPickerMaxCards = 3;
    document.getElementById('cardPickerTitle').textContent = 'Select Flop Cards';
    board.flop.forEach(c => { if(c) cardPickerSelection.push(c.rank + c.suit); });
  } else if(mode === 'turn') {
    cardPickerMaxCards = 1;
    document.getElementById('cardPickerTitle').textContent = 'Select Turn Card';
    board.turn.forEach(c => { if(c) cardPickerSelection.push(c.rank + c.suit); });
  } else if(mode === 'river') {
    cardPickerMaxCards = 1;
    document.getElementById('cardPickerTitle').textContent = 'Select River Card';
    board.river.forEach(c => { if(c) cardPickerSelection.push(c.rank + c.suit); });
  }

  renderCardPicker();
  document.getElementById('cardPickerModal').classList.add('open');
}

function renderCardPicker() {
  const grid = document.getElementById('cardPickerGrid');
  grid.innerHTML = '';

  // Build set of currently used cards, excluding cards from this picker context
  const contextUsed = new Set(usedCards);
  // Remove cards that belong to current selection context so they appear selectable
  if(cardPickerMode === 'hole' && selectedSeatIdx !== null) {
    seats[selectedSeatIdx].cards.forEach(c => { if(c) contextUsed.delete(c.rank + c.suit); });
  } else if(cardPickerMode === 'flop') {
    board.flop.forEach(c => { if(c) contextUsed.delete(c.rank + c.suit); });
  } else if(cardPickerMode === 'turn') {
    board.turn.forEach(c => { if(c) contextUsed.delete(c.rank + c.suit); });
  } else if(cardPickerMode === 'river') {
    board.river.forEach(c => { if(c) contextUsed.delete(c.rank + c.suit); });
  }

  for(const suit of SUITS) {
    const label = document.createElement('div');
    label.className = 'suit-label';
    label.textContent = suit.symbol + ' ' + suit.name.charAt(0).toUpperCase() + suit.name.slice(1);
    grid.appendChild(label);

    const row = document.createElement('div');
    row.className = 'card-grid';
    for(const rank of RANKS) {
      const key = rank + suit.symbol;
      const card = document.createElement('div');
      card.className = 'card-pick ' + suit.color;
      if(contextUsed.has(key)) card.classList.add('used');
      if(cardPickerSelection.includes(key)) card.classList.add('selected');
      card.innerHTML = `<span>${rank}</span><span>${suit.symbol}</span>`;
      card.onclick = () => pickCard(key, card);
      row.appendChild(card);
    }
    grid.appendChild(row);
  }
}

function pickCard(key, el) {
  if(el.classList.contains('used')) return;
  const idx = cardPickerSelection.indexOf(key);
  if(idx > -1) {
    cardPickerSelection.splice(idx, 1);
    el.classList.remove('selected');
  } else {
    if(cardPickerSelection.length >= cardPickerMaxCards) {
      // Remove first selection
      cardPickerSelection.shift();
    }
    cardPickerSelection.push(key);
    renderCardPicker(); // re-render to update selection highlights
  }
}

function parseCardKey(key) {
  // key like "A♠" or "10♥"
  const suitChar = key.slice(-1);
  const rank = key.slice(0, -1);
  const suitObj = SUITS.find(s => s.symbol === suitChar);
  return {rank, suit: suitChar, color: suitObj ? suitObj.color : 'black'};
}

function confirmCardPicker() {
  // Remove old used cards from context
  if(cardPickerMode === 'hole' && selectedSeatIdx !== null) {
    seats[selectedSeatIdx].cards.forEach(c => { if(c) usedCards.delete(c.rank + c.suit); });
    seats[selectedSeatIdx].cards = [null, null];
    cardPickerSelection.forEach((key, i) => {
      if(i < 2) {
        const parsed = parseCardKey(key);
        seats[selectedSeatIdx].cards[i] = parsed;
        usedCards.add(key);
      }
    });
  } else if(cardPickerMode === 'flop') {
    board.flop.forEach(c => { if(c) usedCards.delete(c.rank + c.suit); });
    board.flop = [null, null, null];
    cardPickerSelection.forEach((key, i) => {
      if(i < 3) {
        board.flop[i] = parseCardKey(key);
        usedCards.add(key);
      }
    });
  } else if(cardPickerMode === 'turn') {
    board.turn.forEach(c => { if(c) usedCards.delete(c.rank + c.suit); });
    board.turn = [null];
    if(cardPickerSelection[0]) {
      board.turn[0] = parseCardKey(cardPickerSelection[0]);
      usedCards.add(cardPickerSelection[0]);
    }
  } else if(cardPickerMode === 'river') {
    board.river.forEach(c => { if(c) usedCards.delete(c.rank + c.suit); });
    board.river = [null];
    if(cardPickerSelection[0]) {
      board.river[0] = parseCardKey(cardPickerSelection[0]);
      usedCards.add(cardPickerSelection[0]);
    }
  }

  closeCardPicker();
  renderTable();
  renderBoard();
}

function closeCardPicker() {
  document.getElementById('cardPickerModal').classList.remove('open');
}

function renderBoard() {
  const row = document.getElementById('boardRow');
  const slots = row.querySelectorAll('.board-slot');
  // Flop
  for(let i = 0; i < 3; i++) {
    const slot = slots[i];
    const c = board.flop[i];
    if(c) {
      slot.innerHTML = `<div class="card ${c.color}" onclick="event.stopPropagation();openCardPicker('flop',0)"><span class="rank">${c.rank}</span><span class="suit">${c.suit}</span></div>`;
      slot.classList.add('filled');
      if(i === 0) slot.innerHTML += '<span class="board-street-label">Flop</span>';
    } else {
      slot.innerHTML = i === 0 ? '<span class="board-street-label">Flop</span>' : '';
      slot.classList.remove('filled');
    }
  }
  // Turn
  const turnSlot = slots[3];
  const tc = board.turn[0];
  if(tc) {
    turnSlot.innerHTML = `<div class="card ${tc.color}" onclick="event.stopPropagation();openCardPicker('turn',0)"><span class="rank">${tc.rank}</span><span class="suit">${tc.suit}</span></div><span class="board-street-label">Turn</span>`;
    turnSlot.classList.add('filled');
  } else {
    turnSlot.innerHTML = '<span class="board-street-label">Turn</span>';
    turnSlot.classList.remove('filled');
  }
  // River
  const riverSlot = slots[4];
  const rc = board.river[0];
  if(rc) {
    riverSlot.innerHTML = `<div class="card ${rc.color}" onclick="event.stopPropagation();openCardPicker('river',0)"><span class="rank">${rc.rank}</span><span class="suit">${rc.suit}</span></div><span class="board-street-label">River</span>`;
    riverSlot.classList.add('filled');
  } else {
    riverSlot.innerHTML = '<span class="board-street-label">River</span>';
    riverSlot.classList.remove('filled');
  }
}

// ==================== STREET ACTIONS ====================
function renderActionBoard() {
  const container = document.getElementById('actionBoard');
  if (currentStreet === 'preflop') {
    container.classList.remove('visible');
    container.innerHTML = '';
    return;
  }

  container.classList.add('visible');
  let html = '';

  function cardHtml(c) {
    if (!c) return '<div class="mini-board-card empty"></div>';
    return `<div class="mini-board-card ${c.color}"><span>${c.rank}</span><span>${c.suit}</span></div>`;
  }

  // Always show flop
  html += cardHtml(board.flop[0]) + cardHtml(board.flop[1]) + cardHtml(board.flop[2]);

  if (currentStreet === 'turn' || currentStreet === 'river') {
    html += '<div class="mini-divider"></div>';
    html += cardHtml(board.turn[0]);
  }

  if (currentStreet === 'river') {
    html += '<div class="mini-divider"></div>';
    html += cardHtml(board.river[0]);
  }

}

function switchStreet(street) {
  currentStreet = street;
  document.querySelectorAll('.street-tab').forEach(t => t.classList.toggle('active', t.dataset.street === street));
  renderActionBoard();
  actingPlayerIdx = null;
  document.getElementById('actionButtons').classList.remove('visible');
  document.getElementById('actionAmount').classList.remove('visible');
  renderActivePlayers();
  renderTimeline();
  renderTable();
  updatePotDisplay();
}

function getActiveSeats() {
  // Return seats that have a name or are hero and haven't folded in a previous street
  const result = [];
  // Compute fold status up to current street
  const streetOrder = ['preflop','flop','turn','river'];
  const currentIdx = streetOrder.indexOf(currentStreet);
  const folded = new Set();
  for(let si = 0; si <= currentIdx; si++) {
    const st = streetOrder[si];
    actions[st].forEach(a => { if(a.type === 'fold') folded.add(a.seatIdx); });
  }

  for(let i = 0; i < tableSize; i++) {
    const s = seats[i];
    if(s.name || s.isHero) {
      result.push({seatIdx: i, folded: folded.has(i)});
    }
  }
  return result;
}

function renderActivePlayers() {
  const container = document.getElementById('activePlayers');
  const active = getActiveSeats();
  container.innerHTML = '';
  active.forEach(({seatIdx, folded}) => {
    const s = seats[seatIdx];
    const pos = getPositionForSeat(seatIdx);
    const name = s.isHero ? 'Hero' : s.name;
    const chip = document.createElement('div');
    chip.className = 'player-chip' + (folded ? ' folded' : '') + (seatIdx === actingPlayerIdx ? ' acting' : '');
    chip.innerHTML = `<span class="chip-pos">${pos}</span> ${name}`;
    if(!folded) {
      chip.onclick = () => selectActingPlayer(seatIdx);
    }
    container.appendChild(chip);
  });
}

function getLastBetAmount(street) {
  const streetActions = actions[street || currentStreet];
  for (let i = streetActions.length - 1; i >= 0; i--) {
    const a = streetActions[i];
    if (['bet', 'raise', 'allin'].includes(a.type) && a.amount) {
      return parseFloat(a.amount);
    }
  }
  // Preflop default: the big blind or straddle
  if ((street || currentStreet) === 'preflop') {
    const straddle = parseFloat(document.getElementById('straddle').value) || 0;
    if (straddle > 0) return straddle;
    const blindsStr = document.getElementById('blinds').value;
    const parts = blindsStr.split('/');
    return parseFloat(parts[1]) || 0;
  }
  return 0;
}

function selectActingPlayer(seatIdx) {
  actingPlayerIdx = seatIdx;
  document.getElementById('actionButtons').classList.add('visible');
  renderActivePlayers();
  // Pre-fill amount with last bet/raise
  const amtInput = document.getElementById('actionAmount');
  amtInput.classList.add('visible');
  const lastBet = getLastBetAmount();
  amtInput.value = lastBet > 0 ? lastBet : '';
}

function logAction(type) {
  if(actingPlayerIdx === null) return;
  // Will auto-save after action is logged (see end of function)
  let amount = document.getElementById('actionAmount').value;
  // Auto-fill call amount
  if (type === 'call' && (!amount || amount === '0')) {
    amount = getLastBetAmount() || '';
  }
  const entry = {
    seatIdx: actingPlayerIdx,
    type: type,
    amount: (type === 'bet' || type === 'raise' || type === 'allin' || type === 'call') ? (amount || '') : '',
    playerName: seats[actingPlayerIdx].isHero ? 'Hero' : seats[actingPlayerIdx].name,
    position: getPositionForSeat(actingPlayerIdx)
  };
  actions[currentStreet].push(entry);

  if(type === 'fold') {
    foldedPlayers.add(actingPlayerIdx);
  }

  actingPlayerIdx = null;
  document.getElementById('actionButtons').classList.remove('visible');
  document.getElementById('actionAmount').classList.remove('visible');
  renderActivePlayers();
  renderTimeline();
  renderTable();
  updatePotDisplay();
}

function renderTimeline() {
  const container = document.getElementById('actionTimeline');
  const streetActions = actions[currentStreet];
  container.innerHTML = '';
  streetActions.forEach((a, i) => {
    const actionColors = {fold:'var(--red)',check:'var(--green)',call:'#60a5fa',bet:'#fbbf24',raise:'#fbbf24',allin:'#ff6b6b'};
    const label = a.type === 'allin' ? 'ALL-IN' : a.type.charAt(0).toUpperCase() + a.type.slice(1);
    const div = document.createElement('div');
    div.className = 'timeline-entry';
    div.innerHTML = `
      <span class="timeline-player">${a.position} ${a.playerName}</span>
      <span class="timeline-action" style="color:${actionColors[a.type]}">${label}</span>
      ${a.amount ? `<span class="timeline-amount">$${a.amount}</span>` : ''}
      <button class="timeline-delete" onclick="event.stopPropagation();deleteAction('${currentStreet}',${i})">&times;</button>
    `;
    div.onclick = () => openEditAction(currentStreet, i);
    container.appendChild(div);
  });
}

let editingStreet = null;
let editingIdx = null;
let editingType = null;

function openEditAction(street, idx) {
  const a = actions[street][idx];
  editingStreet = street;
  editingIdx = idx;
  editingType = a.type;

  document.getElementById('editActionTitle').textContent = 'Edit: ' + a.position + ' ' + a.playerName;

  // Highlight current action type
  document.querySelectorAll('#editActionTypes button').forEach(btn => {
    const btnType = btn.textContent.toLowerCase().replace('-', '');
    btn.classList.toggle('active', btnType === a.type);
  });

  // Show/hide amount
  const needsAmount = ['bet', 'raise', 'call', 'allin'].includes(a.type);
  document.getElementById('editAmountRow').style.display = needsAmount ? 'flex' : 'none';
  document.getElementById('editAmountInput').value = a.amount || '';

  document.getElementById('editActionOverlay').classList.add('active');
}

function setEditAction(type) {
  editingType = type;
  document.querySelectorAll('#editActionTypes button').forEach(btn => {
    const btnType = btn.textContent.toLowerCase().replace('-', '');
    btn.classList.toggle('active', btnType === type);
  });
  const needsAmount = ['bet', 'raise', 'call', 'allin'].includes(type);
  document.getElementById('editAmountRow').style.display = needsAmount ? 'flex' : 'none';
  // Pre-fill call amount
  if (type === 'call' && editingStreet) {
    const lastBet = getLastBetAmount(editingStreet);
    if (lastBet > 0) document.getElementById('editAmountInput').value = lastBet;
  }
}

function confirmEditAction() {
  if (editingStreet === null || editingIdx === null) return;
  const a = actions[editingStreet][editingIdx];
  const oldType = a.type;
  const newType = editingType;
  const amount = parseFloat(document.getElementById('editAmountInput').value) || 0;

  // Update fold tracking
  if (oldType === 'fold' && newType !== 'fold') foldedPlayers.delete(a.seatIdx);
  if (oldType !== 'fold' && newType === 'fold') foldedPlayers.add(a.seatIdx);

  a.type = newType;
  a.amount = ['bet', 'raise', 'call', 'allin'].includes(newType) ? amount : 0;

  closeEditAction();
  renderTimeline();
  renderActivePlayers();
  renderTable();
  updatePotDisplay();
  showToast('Action updated');
}

function closeEditAction() {
  document.getElementById('editActionOverlay').classList.remove('active');
  editingStreet = null;
  editingIdx = null;
  editingType = null;
}

function deleteAction(street, idx) {
  const a = actions[street][idx];
  if(a.type === 'fold') foldedPlayers.delete(a.seatIdx);
  actions[street].splice(idx, 1);
  renderTimeline();
  renderActivePlayers();
  renderTable();
  updatePotDisplay();
}

function getRemainingStack(seatIdx) {
  const startStack = parseFloat(seats[seatIdx].stack) || 0;
  if (startStack === 0) return 0;
  let totalInvested = 0;

  // Sum all amounts this player has put in across ALL streets
  const streetOrder = ['preflop', 'flop', 'turn', 'river'];
  for (const st of streetOrder) {
    actions[st].forEach(a => {
      if (a.seatIdx === seatIdx && a.amount) {
        totalInvested += parseFloat(a.amount) || 0;
      }
    });
  }

  return Math.max(0, Math.round(startStack - totalInvested));
}

function calculatePot() {
  let pot = 0;
  // Add blinds
  const blindsStr = document.getElementById('blinds').value;
  const parts = blindsStr.split('/');
  if(parts.length === 2) {
    pot += parseFloat(parts[0]) || 0;
    pot += parseFloat(parts[1]) || 0;
  }
  const straddle = parseFloat(document.getElementById('straddle').value) || 0;
  pot += straddle;

  // Sum all bet/raise/call/allin amounts across all streets
  ['preflop','flop','turn','river'].forEach(st => {
    actions[st].forEach(a => {
      if(a.amount && (a.type === 'bet' || a.type === 'raise' || a.type === 'call' || a.type === 'allin')) {
        pot += parseFloat(a.amount) || 0;
      }
    });
  });
  return pot;
}

function updatePotDisplay() {
  const pot = calculatePot();
  document.getElementById('potDisplay').textContent = pot;
  document.getElementById('streetPotAmount').textContent = pot;
}

function generateRecap(mode) {
  try {
  mode = mode || 'full';
  document.getElementById('quizOverlay').classList.remove('active');
  document.getElementById('dropdownMenu').classList.remove('open');
  const overlay = document.getElementById('recapOverlay');
  const content = document.getElementById('recapContent');

  const heroSeat = seats.find(s => s.isHero);
  const heroIdx = seats.findIndex(s => s.isHero);
  const heroPos = heroIdx >= 0 ? getPositionForSeat(heroIdx) : '?';
  const blinds = document.getElementById('blinds').value || '?/?';
  const gameType = document.getElementById('gameType').value;
  const pot = calculatePot();
  const notes = document.getElementById('handNotes')?.value || '';

  function cardHTML(c, small) {
    if(!c) return '';
    const w = small ? 40 : 44;
    const h = small ? 56 : 62;
    return `<div class="card ${c.color}" style="width:${w}px;height:${h}px;cursor:default;"><span class="rank">${c.rank}</span><span class="suit">${c.suit}</span></div>`;
  }

  // Hero cards
  let heroCardsHTML = '';
  if(heroSeat && (heroSeat.cards[0] || heroSeat.cards[1])) {
    heroCardsHTML = `<div class="recap-cards-group">${heroSeat.cards.map(c => cardHTML(c)).join('')}</div>`;
  }

  // Villain cards
  let villainCardsHTML = '';
  seats.forEach((s, i) => {
    if(i !== heroIdx && (s.cards[0] || s.cards[1]) && (s.name || !s.isHero)) {
      const pos = getPositionForSeat(i);
      const name = s.name || `Seat ${i+1}`;
      villainCardsHTML += `
        <span class="recap-vs">${name} (${pos})</span>
        <div class="recap-cards-group">${s.cards.map(c => cardHTML(c)).join('')}</div>
      `;
    }
  });

  // Board
  let boardHTML = '';
  const allBoard = [...board.flop, ...board.turn, ...board.river].filter(Boolean);
  if(allBoard.length > 0) {
    boardHTML = '<div class="recap-board-label">Board</div><div class="recap-board-cards">';
    board.flop.forEach(c => { if(c) boardHTML += cardHTML(c, true); });
    if(board.turn[0]) {
      boardHTML += '<div class="board-divider" style="width:1px;height:40px;background:#3a4a6a;margin:0 4px;"></div>';
      boardHTML += cardHTML(board.turn[0], true);
    }
    if(board.river[0]) {
      boardHTML += '<div class="board-divider" style="width:1px;height:40px;background:#3a4a6a;margin:0 4px;"></div>';
      boardHTML += cardHTML(board.river[0], true);
    }
    boardHTML += '</div>';
  }

  // Street actions
  let streetsHTML = '';
  ['preflop','flop','turn','river'].forEach(st => {
    if(actions[st].length === 0) return;
    const actionsText = actions[st].map(a => {
      const label = a.type === 'allin' ? 'ALL-IN' : a.type.charAt(0).toUpperCase() + a.type.slice(1);
      return `<strong>${a.playerName}</strong> (${a.position}) ${label}${a.amount ? ' ' + a.amount : ''}`;
    }).join(' &rarr; ');
    streetsHTML += `
      <div class="recap-street">
        <div class="recap-street-title">${st.charAt(0).toUpperCase() + st.slice(1)}</div>
        <div class="recap-street-actions">${actionsText}</div>
      </div>
    `;
  });

  // Tags
  let tagsHTML = '';
  if(activeTags.size > 0) {
    const tagColors = {bluff:'#3b1f4a;color:#c084fc',cooler:'#3b2a1a;color:#fbbf24','hero fold':'#1a2a4a;color:#60a5fa','value bet':'#1a3a2a;color:#4ade80','slow play':'#3b1a3b;color:#e879f9','3-bet pot':'#3b2a1a;color:#fb923c'};
    tagsHTML = '<div class="recap-tags">';
    activeTags.forEach(tag => {
      const style = tagColors[tag] || '#1a2a3a;color:#8b9dc3';
      tagsHTML += `<span class="recap-tag" style="background:${style}">${tag}</span>`;
    });
    tagsHTML += '</div>';
  }

  // Result
  let resultHTML = '';
  if(handResult) {
    const cls = handResult === 'won' ? 'won' : 'lost';
    const color = handResult === 'won' ? 'var(--green)' : 'var(--red)';
    resultHTML = `
      <div class="recap-result ${cls}">
        <div class="result-text" style="color:${color}">${handResult === 'won' ? 'Won' : 'Lost'}</div>
        <div class="result-pot">Pot: ${pot}</div>
      </div>
    `;
  }

  // Straddle for title
  const straddleVal = parseFloat(document.getElementById('straddle').value) || 0;
  const straddleText = straddleVal > 0 ? ` | Straddle $${straddleVal}` : '';

  // Face-down card HTML
  function faceDownCard() {
    return `<div class="card" style="width:44px;height:62px;cursor:default;background:linear-gradient(135deg,#2a3550,#1e2a40);border:1px solid #3a4a6a;display:flex;align-items:center;justify-content:center;"><span style="color:#5a6a8a;font-size:1.2rem;">?</span></div>`;
  }

  // Villain names + positions for face-down display
  let villainFaceDownHTML = '';
  seats.forEach((s, i) => {
    if(i !== heroIdx && (s.cards[0] || s.cards[1]) && (s.name || !s.isHero)) {
      const pos = getPositionForSeat(i);
      const name = s.name || `Seat ${i+1}`;
      villainFaceDownHTML += `
        <span class="recap-vs">${name} (${pos})</span>
        <div class="recap-cards-group">${faceDownCard()}${faceDownCard()}</div>
      `;
    }
  });

  // Board cards per street
  function boardCardsForStreet(upToStreet) {
    let html = '<div class="recap-board-cards" style="display:flex;gap:4px;align-items:center;">';
    board.flop.forEach(c => { if(c) html += cardHTML(c, true); });
    if ((upToStreet === 'turn' || upToStreet === 'river') && board.turn[0]) {
      html += '<div style="width:1px;height:40px;background:#3a4a6a;margin:0 4px;"></div>';
      html += cardHTML(board.turn[0], true);
    }
    if (upToStreet === 'river' && board.river[0]) {
      html += '<div style="width:1px;height:40px;background:#3a4a6a;margin:0 4px;"></div>';
      html += cardHTML(board.river[0], true);
    }
    html += '</div>';
    return html;
  }

  // Build story-style recap based on mode
  // Modes: 'full', 'after-preflop', 'after-flop', 'after-turn', 'before-showdown'
  // Define what each mode shows:
  const streetFlow = {
    'after-preflop':   { streets: ['preflop'], quizBoard: 'flop',  quizText: 'What would you do here?' },
    'after-flop':      { streets: ['preflop','flop'], quizBoard: 'turn', quizText: "What's your play?" },
    'after-turn':      { streets: ['preflop','flop','turn'], quizBoard: 'river', quizText: 'River decision — what do you do?' },
    'before-showdown': { streets: ['preflop','flop','turn','river'], quizBoard: null, quizText: 'What did villain have?' },
    'full':            { streets: ['preflop','flop','turn','river'], quizBoard: null, quizText: null }
  };

  const flow = streetFlow[mode] || streetFlow['full'];
  const showShowdown = mode === 'full';
  let storyHTML = '';

  function streetActionHTML(st) {
    if (actions[st].length === 0) return '';
    const actText = actions[st].map(a => {
      const label = a.type === 'allin' ? 'ALL-IN' : a.type.charAt(0).toUpperCase() + a.type.slice(1);
      return `<strong>${a.playerName}</strong> (${a.position}) ${label}${a.amount ? ' $' + a.amount : ''}`;
    }).join(' &rarr; ');
    return `<div class="recap-street"><div class="recap-street-actions">${actText}</div></div>`;
  }

  // Calculate hero stack remaining after each street
  function heroStackAfterStreet(upToStreet) {
    if (heroIdx < 0 || !heroSeat || !heroSeat.stack) return '';
    const startStack = parseFloat(heroSeat.stack) || 0;
    let invested = 0;
    const streetOrder = ['preflop', 'flop', 'turn', 'river'];
    for (const st of streetOrder) {
      actions[st].forEach(a => {
        if (a.seatIdx === heroIdx && a.amount) invested += parseFloat(a.amount) || 0;
      });
      if (st === upToStreet) break;
    }
    const remaining = Math.max(0, Math.round(startStack - invested));
    return `<div style="font-size:.65rem;color:var(--dim);margin-top:2px;">Hero stack: $${remaining}</div>`;
  }

  // Render each street in flow
  flow.streets.forEach(st => {
    if (st === 'preflop') {
      if (actions.preflop.length > 0) {
        const actText = actions.preflop.map(a => {
          const label = a.type === 'allin' ? 'ALL-IN' : a.type.charAt(0).toUpperCase() + a.type.slice(1);
          return `<strong>${a.playerName}</strong> (${a.position}) ${label}${a.amount ? ' $' + a.amount : ''}`;
        }).join(' &rarr; ');
        storyHTML += `<div class="recap-street"><div class="recap-street-title">Preflop</div><div class="recap-street-actions">${actText}</div>${heroStackAfterStreet('preflop')}</div>`;
      }
    } else if (st === 'flop') {
      if (board.flop.some(c => c)) {
        storyHTML += `<div class="recap-board-label" style="margin-top:12px;">Flop</div>${boardCardsForStreet('flop')}`;
      }
      if (actions.flop.length > 0) {
        storyHTML += streetActionHTML('flop');
      }
      storyHTML += heroStackAfterStreet('flop');
    } else if (st === 'turn') {
      if (board.turn[0]) {
        storyHTML += `<div class="recap-board-label" style="margin-top:12px;">Turn</div>${boardCardsForStreet('turn')}`;
      }
      if (actions.turn.length > 0) {
        storyHTML += streetActionHTML('turn');
      }
      storyHTML += heroStackAfterStreet('turn');
    } else if (st === 'river') {
      if (board.river[0]) {
        storyHTML += `<div class="recap-board-label" style="margin-top:12px;">River</div>${boardCardsForStreet('river')}`;
      }
      if (actions.river.length > 0) {
        storyHTML += streetActionHTML('river');
      }
      storyHTML += heroStackAfterStreet('river');
    }
  });

  // Quiz: show the next board card + prompt
  if (flow.quizBoard) {
    if (flow.quizBoard === 'flop' && board.flop.some(c => c)) {
      storyHTML += `<div class="recap-board-label" style="margin-top:12px;">Flop</div>${boardCardsForStreet('flop')}`;
    } else if (flow.quizBoard === 'turn' && board.turn[0]) {
      storyHTML += `<div class="recap-board-label" style="margin-top:12px;">Turn</div>${boardCardsForStreet('turn')}`;
    } else if (flow.quizBoard === 'river' && board.river[0]) {
      storyHTML += `<div class="recap-board-label" style="margin-top:12px;">River</div>${boardCardsForStreet('river')}`;
    }
  }

  // Quiz prompt
  if (flow.quizText && mode !== 'full') {
    storyHTML += `<div class="recap-quiz-prompt">${flow.quizText}</div>`;
  }

  // Reveal villain cards (full mode only)
  let villainRevealHTML = '';
  if (showShowdown && villainCardsHTML) {
    villainRevealHTML = `
      <div style="margin-top:16px;padding-top:12px;border-top:1px solid var(--border);">
        <div class="recap-board-label">Showdown</div>
        <div class="recap-cards-row">${villainCardsHTML}</div>
      </div>
    `;
  }

  content.innerHTML = `
    <div class="recap-card">
      <div class="recap-header">
        <h2>Hand Recap</h2>
        <div class="recap-meta">${gameType.charAt(0).toUpperCase() + gameType.slice(1)} | ${blinds}${straddleText} | ${tableSize}-max</div>
      </div>

      <div class="recap-positions">
        <span class="recap-position">Hero: ${heroPos}</span>
      </div>

      <div class="recap-cards-row">
        ${heroCardsHTML}
        ${villainFaceDownHTML}
      </div>

      ${storyHTML}
      ${villainRevealHTML}
      ${showShowdown ? resultHTML : ''}
      ${showShowdown ? tagsHTML : ''}
      ${showShowdown && notes ? `<div class="recap-notes">${notes}</div>` : ''}
    </div>
  `;

  overlay.classList.add('open');
  } catch(err) {
    console.error('Recap error:', err);
    alert('Recap error: ' + err.message);
  }
}

async function shareRecap() {
  const btn = document.querySelector('.recap-share-btn');
  const origText = btn.innerHTML;
  btn.disabled = true;
  btn.textContent = 'Generating...';

  try {
    const recapCard = document.querySelector('.recap-card');
    const canvas = await html2canvas(recapCard, {
      backgroundColor: '#0a0e17',
      scale: 2,
      useCORS: true,
      logging: false
    });

    const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/png'));
    const file = new File([blob], 'hand-recap.png', { type: 'image/png' });

    // Try Web Share API (mobile)
    if (navigator.share && navigator.canShare && navigator.canShare({ files: [file] })) {
      await navigator.share({
        files: [file],
        title: 'Poker Hand Recap',
        text: 'Check out this hand!'
      });
    } else {
      // Fallback: download the image
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'hand-recap.png';
      a.click();
      URL.revokeObjectURL(url);
      showToast('Image downloaded');
    }
  } catch (err) {
    if (err.name !== 'AbortError') {
      console.error('Share error:', err);
      showToast('Share failed — try again');
    }
  }

  btn.disabled = false;
  btn.innerHTML = origText;
}

let currentHandId = null;
let currentHandName = null;

function getHandState() {
  return {
    tableSize, dealerSeatIdx, seats: JSON.parse(JSON.stringify(seats)),
    board: JSON.parse(JSON.stringify(board)), usedCards: [...usedCards],
    actions: JSON.parse(JSON.stringify(actions)), foldedPlayers: [...foldedPlayers],
    currentStreet, handResult, activeTags: [...activeTags],
    blinds: document.getElementById('blinds').value,
    straddle: document.getElementById('straddle').value,
    gameType: document.getElementById('gameType').value,
    notes: document.getElementById('notesField')?.value || ''
  };
}

function loadHandState(state) {
  tableSize = state.tableSize || 6;
  document.getElementById('tableToggle').value = tableSize;
  dealerSeatIdx = state.dealerSeatIdx || 0;
  seats = state.seats || [];
  board = state.board || {flop:[null,null,null], turn:[null], river:[null]};
  usedCards = new Set(state.usedCards || []);
  actions = state.actions || {preflop:[], flop:[], turn:[], river:[]};
  foldedPlayers = new Set(state.foldedPlayers || []);
  currentStreet = state.currentStreet || 'preflop';
  handResult = state.handResult || null;
  activeTags = new Set(state.activeTags || []);

  document.getElementById('blinds').value = state.blinds || '1/2';
  document.getElementById('straddle').value = state.straddle || '0';
  document.getElementById('gameType').value = state.gameType || 'cash';
  const notesField = document.getElementById('notesField');
  if (notesField) notesField.value = state.notes || '';

  // Update result buttons
  document.querySelectorAll('[onclick*="setResult"]').forEach(b => {
    b.classList.toggle('active', handResult && b.textContent.toLowerCase() === handResult);
  });
  // Update tag buttons
  document.querySelectorAll('[onclick*="toggleTag"]').forEach(b => {
    const tag = b.textContent.toLowerCase().replace(/\s+/g, '-');
    b.classList.toggle('active', activeTags.has(tag));
  });

  selectedSeatIdx = null;
  renderTable();
  renderBoard();
  renderActions();
  updatePot();
}

function getSavedHands() {
  try { return JSON.parse(localStorage.getItem('pokerHands') || '[]'); }
  catch { return []; }
}

function saveSavedHands(hands) {
  localStorage.setItem('pokerHands', JSON.stringify(hands));
  // Also sync to server
  syncToServer(hands);
}

async function syncToServer(hands) {
  try {
    await fetch('/api/sync', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(hands)
    });
  } catch(e) { /* silent fail */ }
}

async function syncFromServer() {
  try {
    const resp = await fetch('/api/sync');
    const serverHands = await resp.json();
    if (Array.isArray(serverHands) && serverHands.length > 0) {
      // Merge server hands with local
      const local = getSavedHands();
      const merged = [...serverHands];
      for (const lh of local) {
        if (!merged.find(h => h.id === lh.id)) merged.push(lh);
      }
      merged.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
      localStorage.setItem('pokerHands', JSON.stringify(merged));
    }
  } catch(e) { /* silent fail */ }
}

// Auto-save: persist current hand state on every change
function autoSave() {
  if (!currentHandId) {
    // Auto-create a hand if none exists
    const hero = seats.find(s => s.isHero);
    if (hero || actions.preflop.length > 0 || board.flop.some(c => c)) {
      const id = Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
      let name = 'Hand ' + new Date().toLocaleDateString();
      if (hero && hero.cards[0]) {
        name = hero.cards[0].rank + hero.cards[0].suit;
        if (hero.cards[1]) name += hero.cards[1].rank + hero.cards[1].suit;
        name += ' — ' + new Date().toLocaleDateString();
      }
      const hands = getSavedHands();
      hands.unshift({ id, name, state: getHandState(), createdAt: new Date().toISOString(), updatedAt: new Date().toISOString() });
      saveSavedHands(hands);
      currentHandId = id;
      currentHandName = name;
    }
  } else {
    const hands = getSavedHands();
    const idx = hands.findIndex(h => h.id === currentHandId);
    if (idx >= 0) {
      hands[idx].state = getHandState();
      hands[idx].updatedAt = new Date().toISOString();
      saveSavedHands(hands);
    }
  }
}

// Debounced auto-save
let autoSaveTimer = null;
function scheduleAutoSave() {
  clearTimeout(autoSaveTimer);
  autoSaveTimer = setTimeout(autoSave, 1000);
}

// Hook auto-save into renderTable (called after every state change)
const _origRenderTable = renderTable;
renderTable = function() {
  _origRenderTable();
  scheduleAutoSave();
};

// Sync from server on load
syncFromServer();
